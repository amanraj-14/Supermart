<!DOCTYPE html>
<html>

<head>
<title>SuperMart</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="navbar">

<div class="logo">SuperMart</div>

<nav>
<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About Us</a></li>
<li><a href="contact.html">Contact Us</a></li>
</ul>
</nav>

<div class="nav-right">

<input type="text" id="topSearchBar"
placeholder="Search products..."
class="search-box">

<button class="cart-btn" onclick="toggleCart()">
🛒 Cart <span id="cart-count">0</span>
</button>

<div id="cart-dropdown" class="cart-dropdown"></div>

</div>

</div>
</header>

<!-- Hero Section -->
<div class="deal">
<h2>🔥 Deal of the Day</h2>
<h1 id="deal-timer">00 : 00 : 00</h1>
</div>

<section class="hero">
<div class="hero-content">
<h1>Fresh Grocery Delivered</h1>
<p>Best quality products at best price</p>
</div>
</section>

<!-- BIG SEARCH -->
<div class="big-search">
<input type="text" id="bigSearchBar"
placeholder="Search for groceries...">
</div>

<!-- Categories -->
<div class="categories">
<button class="category-btn active" data-category="all">All</button>
<button class="category-btn" data-category="vegetable">🥦 Vegetables</button>
<button class="category-btn" data-category="fruit">🍎 Fruits</button>
<button class="category-btn" data-category="dairy">🥛 Dairy</button>
<button class="category-btn" data-category="grocery">🍚 Grocery</button>
</div>

<!-- SHOP LAYOUT -->
<div class="shop-layout">

<div class="products-section">
<h2 class="section-title">Products</h2>
<div class="products" id="product-list"></div>
</div>

<div class="recommend-section">
<h3>You May Also Like</h3>
<div class="recommendations" id="recommend-list"></div>
</div>

</div>

<!-- Cart Sidebar -->
<div id="cartSidebar" class="cart-sidebar">

<div class="cart-header">
<h3>Your Cart</h3>
<button onclick="toggleCart()">✖</button>
</div>

<div id="cart-items"></div>

<div class="cart-footer">
<h4>Total: ₹ <span id="cart-total">0</span></h4>

<!-- ✅ UPDATED BUTTON -->
<button onclick="payNow()" class="checkout-btn">Pay Now</button>

</div>

</div>

<!-- ✅ Razorpay Script -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script src="script.js"></script>

<!-- ✅ Payment Script -->
<script>
async function payNow() {

    // 🛒 cart total le lo
    let totalAmount = document.getElementById("cart-total").innerText;

    if (totalAmount == 0) {
        alert("Cart is empty ❌");
        return;
    }

    // Step 1: backend se order lo
    const res = await fetch("http://127.0.0.1:8000/create-order", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ amount: parseInt(totalAmount) })
    });

    const order = await res.json();

    // Step 2: Razorpay open
    var options = {
        key: "rzp_live_SVCKvRTPMPouRX", // 🔑 yaha apni key daalo
        amount: order.amount,
        currency: "INR",
        name: "SuperMart",
        description: "Grocery Payment",
        order_id: order.id,

        handler: function (response){
            alert("Payment Successful ✅");
        },

        theme: {
            color: "#3399cc"
        }
    };

    var rzp = new Razorpay(options);
    rzp.open();
}
</script>

</body>
</html>
